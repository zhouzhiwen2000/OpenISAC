# ===== OFDM Frame =====
fft_size: 1024  # FFT size (subcarrier count)
cp_length: 128  # Cyclic prefix length (samples)
sync_pos: 1  # Sync symbol index in one frame
num_symbols: 100  # Number of OFDM symbols per frame
zc_root: 29  # Zadoff-Chu root for sync/preamble
pilot_positions: [571, 631, 692, 752, 812, 872, 933, 993, 29, 89, 150, 210, 270, 330, 391, 451]  # Pilot subcarrier indices

# ===== RF / Sampling =====
sample_rate: 200000000  # Baseband sample rate (Hz)
bandwidth: 200000000  # Analog bandwidth (Hz), usually same as sample_rate
center_freq: 2800000000  # RF center frequency (Hz)
tx_gain: 60  # TX gain (dB)
tx_channel: 0  # TX channel index on USRP

# ===== USRP Device Args =====
device_args: "addr=192.168.30.2, master_clock_rate=200e6, num_recv_frames=2048, num_send_frames=2048"  # Shared fallback args
tx_device_args: ""  # TX-specific args (empty = use device_args)
rx_device_args: ""  # Default sensing RX args (empty = use device_args)

# ===== Clock / Time Sources =====
clock_source: external  # Global clock source: internal/external/gpsdo
time_source: internal  # Global time source: empty -> follow clock_source
tx_clock_source: ""  # TX clock source override (optional)
tx_time_source: ""  # TX time source override (optional)
rx_clock_source: ""  # Sensing RX clock source override (optional)
rx_time_source: ""  # Sensing RX time source override (optional)

# ===== Wire Format =====
wire_format_tx: sc16  # TX wire format: sc16/sc8
wire_format_rx: sc16  # RX wire format: sc16/sc8

# ===== Network Output =====
udp_input_ip: 0.0.0.0  # Bind IP for incoming payload UDP packets
udp_input_port: 50000  # Bind port for incoming payload UDP packets
mono_sensing_ip: 192.168.2.178  # Monostatic sensing output IP (channel 0 default)
mono_sensing_port: 8888  # Monostatic sensing output port (channel 0 default)
control_port: 9999  # UDP port for runtime control commands
default_ip: 192.168.2.178  # Default destination IP when per-output IP is empty

# ===== Sensing RX Channels =====
sensing_rx_channel_count: 1  # Number of sensing RX channels (0 disables sensing RX)
sensing_rx_channels: []
range_fft_size: 1024
doppler_fft_size: 100
sensing_symbol_num: 100
sensing_symbol_stride: 20  # Default STRD applied at startup before runtime commands

# ===== Runtime / Debug =====
tx_circular_buffer_size: 32  # Modulator frame circular buffer capacity
data_packet_buffer_size: 32  # Encoded packet buffer capacity
paired_frame_queue_size: 32  # Per-channel RX/TX pairing queue capacity
profiling_modules: ""  # Comma-separated modules to profile, or "all"
cpu_cores:
  - 5  # idx0 (hint 0): _tx_proc
  - 7  # idx1 (hint 1): _modulation_proc
  - 8  # idx2 (hint 2): _data_ingest_proc
  - 9  # idx3 (hint 3): SensingChannel::_rx_loop (CH0)
  - 4  # idx4 (hint 4): SensingChannel::_sensing_loop (CH0)
  - 6  # idx_last: main thread affinity
