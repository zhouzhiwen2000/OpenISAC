common:
  sensing_rx_channels:
    title: Sensing RX Channels
    field:
      type: mapping_list
      key: sensing_rx_channels
      comment: ""
      optional: false
      item_fields:
        - key: usrp_channel
          comment: USRP RX channel index for this sensing path
          kind: int
          default: 1
        - key: device_args
          comment: Per-channel USRP args override (optional)
          kind: string
          default: ""
        - key: clock_source
          comment: Per-channel clock source override (optional)
          kind: string
          default: ""
          options: ["", internal, external, gpsdo]
        - key: time_source
          comment: Per-channel time source override (optional)
          kind: string
          default: ""
          options: ["", internal, external, gpsdo]
        - key: wire_format_rx
          comment: Per-channel wire format override (optional)
          kind: string
          default: ""
          options: ["", sc16, sc8]
        - key: rx_gain
          comment: Per-channel RX gain (dB)
          kind: int
          default: 30
        - key: alignment
          comment: Per-channel timing alignment offset (samples)
          kind: int
          default: 63
        - key: rx_antenna
          comment: RX antenna port (e.g. RX1/RX2/TX/RX)
          kind: string
          default: RX2
          options: [RX1, RX2, TX/RX]
        - key: enable_system_delay_estimation
          comment: If true, this channel runs delay estimation only and disables sensing pipeline
          kind: bool
          default: false
  data_resource_blocks:
    title: Resource Preview
    field:
      type: mapping_list
      key: data_resource_blocks
      comment: Optional payload / sensing-pilot RE rectangles
      allow_omit: true
      optional: true
      planner_kind: payload
      default: []
      item_fields:
        - key: kind
          comment: Block role; payload or sensing_pilot
          kind: string
          default: payload
          options:
            - payload
            - sensing_pilot
        - key: symbol_start
          comment: 0-based absolute frame symbol index
          kind: int
          default: 0
        - key: symbol_count
          comment: Number of OFDM symbols in this block
          kind: int
          default: 1
        - key: subcarrier_start
          comment: 0-based FFT-bin start index
          kind: int
          default: 0
        - key: subcarrier_count
          comment: Number of contiguous subcarriers in this block
          kind: int
          default: 1
  sensing_mask_blocks:
    title: Resource Preview
    field:
      type: mapping_list
      key: sensing_mask_blocks
      comment: Optional compact sensing RE rectangles
      allow_omit: true
      optional: true
      planner_kind: sensing_mask
      default: []
      item_fields:
        - key: symbol_start
          comment: 0-based absolute frame symbol index
          kind: int
          default: 0
        - key: symbol_count
          comment: Number of OFDM symbols in this block
          kind: int
          default: 1
        - key: subcarrier_start
          comment: 0-based FFT-bin start index
          kind: int
          default: 0
        - key: subcarrier_count
          comment: Number of contiguous subcarriers in this block
          kind: int
          default: 1

modulator:
  fft_size:
    title: OFDM Frame
    field:
      type: scalar
      key: fft_size
      kind: int
      comment: FFT size (subcarrier count)
      default: 1024
      optional: true
  cp_length:
    title: OFDM Frame
    field:
      type: scalar
      key: cp_length
      kind: int
      comment: Cyclic prefix length (samples)
      default: 128
      optional: true
  sync_pos:
    title: OFDM Frame
    field:
      type: scalar
      key: sync_pos
      kind: int
      comment: Sync symbol index in one frame
      default: 1
      optional: true
  num_symbols:
    title: OFDM Frame
    field:
      type: scalar
      key: num_symbols
      kind: int
      comment: Number of OFDM symbols per frame
      default: 100
      optional: true
  sensing_symbol_num:
    title: OFDM Frame
    field:
      type: scalar
      key: sensing_symbol_num
      kind: int
      comment: Number of symbols used in sensing processing
      default: 100
      optional: true
  zc_root:
    title: OFDM Frame
    field:
      type: scalar
      key: zc_root
      kind: int
      comment: Zadoff-Chu root for sync/preamble
      default: 29
      optional: true
  pilot_positions:
    title: OFDM Frame
    field:
      type: flow_list
      key: pilot_positions
      item_kind: int
      comment: Pilot subcarrier indices
      default: [571, 631, 692, 752, 812, 872, 933, 993, 29, 89, 150, 210, 270, 330, 391, 451]
      optional: true
  range_fft_size:
    title: Sensing FFT
    field:
      type: scalar
      key: range_fft_size
      kind: int
      comment: Range FFT size
      default: 1024
      optional: true
  doppler_fft_size:
    title: Sensing FFT
    field:
      type: scalar
      key: doppler_fft_size
      kind: int
      comment: Doppler FFT size
      default: 100
      optional: true
  sensing_output_mode:
    title: Sensing FFT
    field:
      type: scalar
      key: sensing_output_mode
      kind: string
      comment: dense or compact_mask
      default: dense
      optional: true
      options: [dense, compact_mask]
  enable_backend_sensing_processing:
    title: Sensing FFT
    field:
      type: scalar
      key: enable_backend_sensing_processing
      kind: bool
      comment: true lets backend publish RD/CFAR/MD metadata sidecars
      default: false
      optional: true
  sensing_view_range_bins:
    title: Sensing FFT
    field:
      type: scalar
      key: sensing_view_range_bins
      kind: int
      comment: Backend RD view width in range bins; 0 uses full range_fft_size
      default: 0
      optional: true
  sensing_view_doppler_bins:
    title: Sensing FFT
    field:
      type: scalar
      key: sensing_view_doppler_bins
      kind: int
      comment: Backend RD view height in Doppler bins; 0 uses full doppler_fft_size
      default: 0
      optional: true
  sample_rate:
    title: RF / Sampling
    field:
      type: scalar
      key: sample_rate
      kind: int
      comment: Baseband sample rate (Hz)
      default: 50000000
      optional: true
  bandwidth:
    title: RF / Sampling
    field:
      type: scalar
      key: bandwidth
      kind: int
      comment: Analog bandwidth (Hz), usually same as sample_rate
      default: 50000000
      optional: true
  center_freq:
    title: RF / Sampling
    field:
      type: scalar
      key: center_freq
      kind: int
      comment: RF center frequency (Hz)
      default: 2400000000
      optional: true
  tx_gain:
    title: RF / Sampling
    field:
      type: scalar
      key: tx_gain
      kind: int
      comment: TX gain (dB)
      default: 60
      optional: true
  tx_channel:
    title: RF / Sampling
    field:
      type: scalar
      key: tx_channel
      kind: int
      comment: TX channel index on USRP
      default: 0
      optional: true
  device_args:
    title: USRP Device Args
    field:
      type: scalar
      key: device_args
      kind: string
      comment: Shared fallback args
      default: "addr=192.168.40.2, master_clock_rate=200e6, num_recv_frames=2048, num_send_frames=2048"
      optional: true
  tx_device_args:
    title: USRP Device Args
    field:
      type: scalar
      key: tx_device_args
      kind: string
      comment: TX-specific args (empty = use device_args)
      default: ""
      optional: true
  rx_device_args:
    title: USRP Device Args
    field:
      type: scalar
      key: rx_device_args
      kind: string
      comment: Default sensing RX args (empty = use device_args)
      default: ""
      optional: true
  clock_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: clock_source
      kind: string
      comment: Global clock source; internal/external/gpsdo
      default: external
      optional: true
      options: [internal, external, gpsdo]
  time_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: time_source
      kind: string
      comment: Global time source; empty follows clock_source
      default: internal
      optional: true
      options: ["", internal, external, gpsdo]
  tx_clock_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: tx_clock_source
      kind: string
      comment: TX clock source override (optional)
      default: ""
      optional: true
      options: ["", internal, external, gpsdo]
  tx_time_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: tx_time_source
      kind: string
      comment: TX time source override (optional)
      default: ""
      optional: true
      options: ["", internal, external, gpsdo]
  rx_clock_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: rx_clock_source
      kind: string
      comment: Sensing RX clock source override (optional)
      default: ""
      optional: true
      options: ["", internal, external, gpsdo]
  rx_time_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: rx_time_source
      kind: string
      comment: Sensing RX time source override (optional)
      default: ""
      optional: true
      options: ["", internal, external, gpsdo]
  wire_format_tx:
    title: Wire Format
    field:
      type: scalar
      key: wire_format_tx
      kind: string
      comment: TX wire format; sc16/sc8
      default: sc16
      optional: true
      options: [sc16, sc8]
  wire_format_rx:
    title: Wire Format
    field:
      type: scalar
      key: wire_format_rx
      kind: string
      comment: RX wire format; sc16/sc8
      default: sc16
      optional: true
      options: [sc16, sc8]
  udp_input_ip:
    title: Network Output
    field:
      type: scalar
      key: udp_input_ip
      kind: string
      comment: Bind IP for incoming payload UDP packets
      default: 0.0.0.0
      optional: true
  udp_input_port:
    title: Network Output
    field:
      type: scalar
      key: udp_input_port
      kind: int
      comment: Bind port for incoming payload UDP packets
      default: 50000
      optional: true
  mono_sensing_ip:
    title: Network Output
    field:
      type: scalar
      key: mono_sensing_ip
      kind: string
      comment: Monostatic sensing output IP (channel 0 default)
      default: 127.0.0.1
      optional: true
  mono_sensing_port:
    title: Network Output
    field:
      type: scalar
      key: mono_sensing_port
      kind: int
      comment: Monostatic sensing output port (channel 0 default)
      default: 8888
      optional: true
  control_port:
    title: Network Output
    field:
      type: scalar
      key: control_port
      kind: int
      comment: UDP port for runtime control commands
      default: 9999
      optional: true
  default_ip:
    title: Network Output
    field:
      type: scalar
      key: default_ip
      kind: string
      comment: Default destination IP when per-output IP is empty
      default: 127.0.0.1
      optional: true
  sensing_symbol_stride:
    title: Network Output
    field:
      type: scalar
      key: sensing_symbol_stride
      kind: int
      comment: Default STRD applied at startup before runtime commands
      default: 20
      optional: true
  sensing_rx_channel_count:
    title: Sensing RX Channels
    field:
      type: scalar
      key: sensing_rx_channel_count
      kind: int
      comment: Number of sensing RX channels (0 disables sensing RX)
      default: 1
      optional: true
  tx_circular_buffer_size:
    title: Runtime / Debug
    field:
      type: scalar
      key: tx_circular_buffer_size
      kind: int
      comment: Modulator frame circular buffer capacity
      default: 32
      optional: true
  data_packet_buffer_size:
    title: Runtime / Debug
    field:
      type: scalar
      key: data_packet_buffer_size
      kind: int
      comment: Encoded packet buffer capacity
      default: 32
      optional: true
  paired_frame_queue_size:
    title: Runtime / Debug
    field:
      type: scalar
      key: paired_frame_queue_size
      kind: int
      comment: Per-channel RX/TX pairing queue capacity
      default: 32
      optional: true
  profiling_modules:
    title: Runtime / Debug
    field:
      type: scalar
      key: profiling_modules
      kind: string
      comment: Comma-separated modules to profile (modulation, latency, data_ingest, sensing_proc), or "all"
      default: ""
      optional: true
  cpu_cores:
    title: Runtime / Debug
    field:
      type: cpu_cores
      key: cpu_cores
      comment: Allowed CPU core list
      default: [1, 2, 3, 4, 5, 6]
      optional: true

