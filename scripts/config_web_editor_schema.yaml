common:
- title: Radio backend
  yaml_key: radio
  order: 10
  fields:
  - type: scalar
    key: radio_backend
    kind: string
    comment: Radio I/O backend; uhd = real USRP, sim = channel simulator
    default: uhd
    optional: true
    options:
    - uhd
    - sim
- title: Channel simulator
  yaml_key: simulation
  order: 11
  fields:
  - type: simulation_mapping
    key: simulation
    comment: Channel simulator parameters used when radio_backend=sim
    default:
      session: oisac_sim
    optional: true
    scalar_fields:
    - key: session
      comment: Shared-memory namespace used by BS, UE, and ChannelSimulator
      kind: string
      default: oisac_sim
      optional: true
    - key: enable_comm_rx
      comment: Produce the communication RX path for UE
      kind: bool
      default: true
      optional: true
    - key: enable_sensing_rx
      comment: Produce monostatic sensing RX paths for the antenna array
      kind: bool
      default: true
      optional: true
    - key: enable_uplink
      comment: Route the UE->BS uplink stream through the simulator (duplex)
      kind: bool
      default: false
      optional: true
    - key: pacing_enabled
      comment: Pace ChannelSimulator output to wall-clock sample time
      kind: bool
      default: true
      optional: true
    - key: noise_power_dbfs
      comment: AWGN power per RX channel in dBFS; very low disables effectively
      kind: float
      default: -100.0
      optional: true
    - key: snr_control_enable
      comment: Scale the clean simulated signal before AWGN to maintain target_snr_db
      kind: bool
      default: false
      optional: true
    - key: target_snr_db
      comment: Initial target SNR in dB when snr_control_enable is true
      kind: float
      default: 40.0
      optional: true
    - key: control_port
      comment: ChannelSimulator ZMQ control port for runtime SNR commands
      kind: int
      default: 10002
      optional: true
    - key: cfo_hz
      comment: Initial BS-to-UE CFO; UE-to-BS is opposite, carrier-ratio-scaled in FDD, and follows UE TX retune
      kind: float
      default: 0.0
      optional: true
    - key: sample_rate_offset_ppm
      comment: UE sample-clock offset relative to the BS clock in ppm
      kind: float
      default: 0.0
      optional: true
    - key: timing_offset_samples
      comment: Constant integer sample delay injected on RX
      kind: int
      default: 0
      optional: true
    - key: array_spacing_m
      comment: Physical ULA element spacing in meters; set <=0 to use array_spacing_lambda
      kind: float
      default: 0.04283
      optional: true
    - key: array_spacing_lambda
      comment: Legacy fixed ULA spacing in wavelengths
      kind: float
      default: 0.5
      optional: true
    - key: ring_capacity_samples
      comment: Per-stream shared-memory ring capacity in complex samples
      kind: int
      default: 262144
      optional: true
    - key: steering_override_file
      comment: Optional array-manifold matrix; when set, angle_deg is ignored and angle-dependent responses must be encoded in the matrix
      kind: string
      default: ''
      optional: true
    list_fields:
    - key: comm_multipath_taps
      comment: Communication-link tapped-delay-line channel taps
      optional: true
      item_fields:
      - key: delay_samples
        comment: Integer sample delay
        kind: int
        default: 0
      - key: gain_db
        comment: Tap magnitude in dB
        kind: float
        default: 0.0
      - key: phase_deg
        comment: Tap phase in degrees
        kind: float
        default: 0.0
    - key: targets
      comment: Monostatic sensing point scatterers
      optional: true
      item_fields:
      - key: range_m
        comment: Target range in meters
        kind: float
        default: 30.0
      - key: velocity_mps
        comment: Radial velocity in m/s; positive approaches
        kind: float
        default: 0.0
      - key: gain_db
        comment: Complex amplitude magnitude in dB
        kind: float
        default: -10.0
      - key: angle_deg
        comment: Angle of arrival in degrees
        kind: float
        default: 0.0
    - key: bistatic_targets
      comment: Bistatic / communication-channel point scatterers
      optional: true
      item_fields:
      - key: range_m
        comment: Target range in meters
        kind: float
        default: 30.0
      - key: velocity_mps
        comment: Radial velocity in m/s; positive approaches
        kind: float
        default: 0.0
      - key: gain_db
        comment: Complex amplitude magnitude in dB
        kind: float
        default: -20.0
      - key: angle_deg
        comment: Angle field kept for schema compatibility; comm RX ignores it
        kind: float
        default: 0.0
- title: Logging
  yaml_key: logging
  order: 110
  fields:
  - type: logging_mapping
    key: logging
    comment: Hierarchical text-log filter. Set default_level globally, then override modules (inherit from parent). Error always prints when force_error is true.
    optional: true
    default:
      default_level: warn
      timestamps: false
      force_error: true
      modules: {}
    scalar_fields:
    - key: default_level
      kind: string
      comment: Global default verbosity (off|error|warn|info|debug)
      default: warn
      optional: true
      options:
      - "off"
      - error
      - warn
      - info
      - debug
    - key: timestamps
      kind: bool
      comment: Prefix each log line with local HH:MM:SS.uuuuuu
      default: false
      optional: true
    - key: force_error
      kind: bool
      comment: Always emit Error (use Error only for unrecoverable failures)
      default: true
      optional: true
    module_fields:
    - path: config
      title: Config / YAML
      comment: YAML parse and clamp (debug)
      depth: 0
    - path: radio
      title: Radio
      comment: Radio backend (debug)
      depth: 0
    - path: radio.uhd
      title: UHD / USRP
      comment: Real USRP path (debug)
      depth: 1
    - path: radio.sim
      title: Sim backend
      comment: Simulation HAL (debug)
      depth: 1
    - path: sync
      title: Sync / CFO / align
      comment: Synchronization diagnostics (debug)
      depth: 0
    - path: demod
      title: Demodulator
      comment: CPU demod diagnostics (debug)
      depth: 0
    - path: demod.ldpc
      title: LDPC decode
      comment: CPU LDPC decode (debug)
      depth: 1
    - path: demod.ldpc.detail
      title: LDPC decode detail
      comment: Verbose LDPC decode internals (debug)
      depth: 2
    - path: demod.llr
      title: LLR / demap
      comment: LLR and demapping (debug)
      depth: 1
    - path: demod.snr
      title: SNR diagnostics
      comment: SNR / quality reports (debug)
      depth: 1
    - path: demod_profiling
      title: Demod load / latency
      comment: PERFORMANCE — frame load & latency timers (off until set)
      depth: 1
    - path: demod_eq_profiling
      title: Equalizer breakdown
      comment: PERFORMANCE — EQ stage breakdown timers (off until set)
      depth: 1
    - path: mod
      title: Modulator
      comment: CPU modulation diagnostics (debug)
      depth: 0
    - path: mod.ldpc
      title: LDPC encode
      comment: CPU LDPC encode (debug)
      depth: 1
    - path: mod.ldpc.detail
      title: LDPC encode detail
      comment: Verbose LDPC encode internals (debug)
      depth: 2
    - path: mod_profiling
      title: Mod load / latency
      comment: PERFORMANCE — modulation load & latency (off until set)
      depth: 1
    - path: mod_ldpc_profiling
      title: LDPC encode timing
      comment: PERFORMANCE — LDPC encode timers (off until set)
      depth: 2
    - path: ul_rx
      title: Uplink RX
      comment: BS uplink receiver (debug)
      depth: 0
    - path: ul_tx
      title: Uplink TX
      comment: UE uplink transmitter (debug)
      depth: 0
    - path: arq
      title: ARQ
      comment: ARQ diagnostics (debug)
      depth: 0
    - path: arq.dl
      title: Downlink ARQ
      comment: Downlink ARQ (debug)
      depth: 1
    - path: arq.ul
      title: Uplink ARQ
      comment: Uplink ARQ (debug)
      depth: 1
    - path: ertm
      title: eRTM
      comment: eRTM timing diagnostics (debug)
      depth: 0
    - path: sensing
      title: Sensing
      comment: Sensing diagnostics (debug)
      depth: 0
    - path: sensing.aggregate
      title: Sensing aggregate
      comment: Aggregate sensing path (debug)
      depth: 1
    - path: sensing_profiling
      title: Sensing timers
      comment: PERFORMANCE — sensing processing timers (off until set)
      depth: 1
    - path: recovery
      title: Recovery / restart
      comment: Stream restart diagnostics (debug)
      depth: 0
    - path: agc
      title: AGC
      comment: AGC diagnostics (debug)
      depth: 0
    - path: ocxo
      title: OCXO / clock
      comment: OCXO and clock loops (debug)
      depth: 0
    - path: channelsim
      title: Channel simulator
      comment: ChannelSimulator hub
      depth: 0
    - path: udp_egress_profiling
      title: UDP pacer stats
      comment: PERFORMANCE — UDP egress pacer throughput (off until set)
      depth: 0
    - path: cuda
      title: CUDA
      comment: CUDA backend diagnostics (debug)
      depth: 0
    - path: cuda.demod
      title: CUDA demod
      comment: CUDA demod diagnostics (debug)
      depth: 1
    - path: cuda.demod.ldpc
      title: CUDA LDPC decode
      comment: CUDA RX LDPC (debug)
      depth: 2
    - path: cuda.demod_profiling
      title: CUDA demod load
      comment: PERFORMANCE — CUDA demod timers (off until set)
      depth: 2
    - path: cuda.demod_eq_profiling
      title: CUDA EQ breakdown
      comment: PERFORMANCE — CUDA EQ breakdown (off until set)
