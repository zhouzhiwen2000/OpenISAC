    default: 12362
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.ertm_to_enable
        value: true
      - key: uplink.ertm_debug_output_enabled
        value: true
  - type: scalar
    key: channel_ip
