- title: CPU Cores
  yaml_key: cpu_cores
  order: 91
  fields:
  - type: flow_list
    key: downlink_cpu_cores
    item_kind: int
    comment: 'UE downlink CPU cores: [rx_proc, process_proc, bit_processing_proc]'
    default:
    - 1
    - 2
    - 3
    optional: true
  - type: flow_list
    key: demod_worker_cpu_cores
    item_kind: int
    comment: 'UE CPU demod worker cores; empty = one unbound worker'
    default: []
    optional: true
  - type: flow_list
    key: ldpc_worker_cpu_cores
    item_kind: int
    comment: 'UE CPU LDPC decode worker cores; empty = one unbound worker'
    default: []
    optional: true
  - type: flow_list
    key: sensing_cpu_cores
    item_kind: int
    comment: 'UE bistatic sensing CPU cores: [sensing_process_proc]'
    default:
    - 4
    optional: true
    enabled_if:
      key: sensing.bi_enabled
      value: true
  - type: flow_list
    key: uplink_cpu_cores
    item_kind: int
    comment: 'UE uplink CPU cores: [UplinkTxEngine LDPC encode, modulation, TX send, UDP recv thread]'
    default: []
    optional: true
  - type: scalar
    key: main_cpu_core
    kind: int
    comment: Main-thread CPU core (-1 disables explicit binding)
    default: -1
    optional: true
- title: Runtime / Debug
  yaml_key: runtime
  order: 100
