    default: 0.0.0.0
    optional: true
  - type: scalar
    key: self_pdf_port
    kind: int
    comment: UE self delay-spectrum output port
    default: 12351
    optional: true
  - type: scalar
    key: self_scan_ip
    kind: string
    comment: UE self-ZC scan-spectrum ZMQ listen IP
    default: 0.0.0.0
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.debug_self_channel
        value: true
      - key: uplink.debug_self_scan_spectrum
        value: true
  - type: scalar
    key: self_scan_port
    kind: int
    comment: UE self-ZC scan-spectrum output port
    default: 12352
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.debug_self_channel
        value: true
      - key: uplink.debug_self_scan_spectrum
        value: true
  - type: scalar
    key: bi_sensing_output_enabled
    kind: bool
    comment: Enable bistatic sensing ZMQ output
    default: true
    optional: true
  - type: scalar
    key: bi_sensing_ip
    kind: string
    comment: Bistatic sensing/control ZMQ bind IP
    default: 0.0.0.0
    optional: true
  - type: scalar
    key: bi_sensing_port
    kind: int
    comment: Bistatic sensing ZMQ output port
    default: 8889
    optional: true
  - type: scalar
    key: control_port
    kind: int
    comment: ZMQ port for runtime control commands
    default: 10001
    optional: true
  - type: scalar
    key: ertm_debug_ip
    kind: string
    comment: eRTM debug ZMQ listen IP
    default: 0.0.0.0
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
