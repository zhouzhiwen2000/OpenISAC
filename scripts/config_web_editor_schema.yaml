common:
  radio_backend:
    title: Radio backend
    field:
      type: scalar
      key: radio_backend
      kind: string
      comment: Radio I/O backend; uhd = real USRP, sim = channel simulator
      default: uhd
      optional: true
      options: [uhd, sim]
  simulation:
    title: Channel simulator
    field:
      type: simulation_mapping
      key: simulation
      comment: Channel simulator parameters used when radio_backend=sim
      default:
        session: oisac_sim
      optional: true
      scalar_fields:
        - key: session
          comment: Shared-memory namespace used by Modulator, Demodulator, and ChannelSimulator
          kind: string
          default: oisac_sim
          optional: true
        - key: enable_comm_rx
          comment: Produce the communication RX path for OFDMDemodulator
          kind: bool
          default: true
          optional: true
        - key: enable_sensing_rx
          comment: Produce monostatic sensing RX paths for the antenna array
          kind: bool
          default: true
          optional: true
        - key: noise_power_dbfs
          comment: AWGN power per RX channel in dBFS; very low disables effectively
          kind: float
          default: -100.0
          optional: true
        - key: snr_control_enable
          comment: Scale the clean simulated signal before AWGN to maintain target_snr_db
          kind: bool
          default: false
          optional: true
        - key: target_snr_db
          comment: Initial target SNR in dB when snr_control_enable is true
          kind: float
          default: 40.0
          optional: true
        - key: control_port
          comment: ChannelSimulator ZMQ control port for runtime SNR commands
          kind: int
          default: 10002
          optional: true
        - key: cfo_hz
          comment: Initial carrier offset before demodulator RX correction in Hz
          kind: float
          default: 0.0
          optional: true
        - key: timing_offset_samples
          comment: Constant integer sample delay injected on RX
          kind: int
          default: 0
          optional: true
        - key: array_spacing_m
          comment: Physical ULA element spacing in meters; set <=0 to use array_spacing_lambda
          kind: float
          default: 0.04283
          optional: true
        - key: array_spacing_lambda
          comment: Legacy fixed ULA spacing in wavelengths
          kind: float
          default: 0.5
          optional: true
        - key: ring_capacity_samples
          comment: Per-stream shared-memory ring capacity in complex samples
          kind: int
          default: 262144
          optional: true
        - key: steering_override_file
          comment: Optional steering matrix file; empty uses ULA steering
          kind: string
          default: ""
          optional: true
      list_fields:
        - key: comm_multipath_taps
          comment: Communication-link tapped-delay-line channel taps
          optional: true
          item_fields:
            - key: delay_samples
              comment: Integer sample delay
              kind: int
              default: 0
            - key: gain_db
              comment: Tap magnitude in dB
              kind: float
              default: 0.0
            - key: phase_deg
              comment: Tap phase in degrees
              kind: float
              default: 0.0
        - key: targets
          comment: Monostatic sensing point scatterers
          optional: true
          item_fields:
            - key: range_m
              comment: Target range in meters
              kind: float
              default: 30.0
            - key: velocity_mps
              comment: Radial velocity in m/s; positive approaches
              kind: float
              default: 0.0
            - key: gain_db
              comment: Complex amplitude magnitude in dB
              kind: float
              default: -10.0
            - key: angle_deg
              comment: Angle of arrival in degrees
              kind: float
              default: 0.0
        - key: bistatic_targets
          comment: Bistatic / communication-channel point scatterers
          optional: true
          item_fields:
            - key: range_m
              comment: Target range in meters
              kind: float
              default: 30.0
            - key: velocity_mps
              comment: Radial velocity in m/s; positive approaches
              kind: float
              default: 0.0
            - key: gain_db
              comment: Complex amplitude magnitude in dB
              kind: float
              default: -20.0
            - key: angle_deg
              comment: Angle field kept for schema compatibility; comm RX ignores it
              kind: float
              default: 0.0
  measurement_enable:
    title: Measurement mode
    field:
      type: scalar
      key: measurement_enable
      kind: bool
      comment: Enable internal PRBS measurement traffic
      default: false
      optional: true
  measurement_mode:
    title: Measurement mode
    field:
      type: scalar
      key: measurement_mode
      kind: string
      comment: Measurement payload generator / checker mode
      default: internal_prbs
      optional: true
      options: ["", internal_prbs]
  measurement_run_id:
    title: Measurement mode
    field:
      type: scalar
      key: measurement_run_id
      kind: string
      comment: Optional run identifier written to measurement CSV summaries
      default: ""
      optional: true
  measurement_output_dir:
    title: Measurement mode
    field:
      type: scalar
      key: measurement_output_dir
      kind: string
      comment: Optional directory for measurement CSV summaries
      default: ""
      optional: true
  measurement_payload_bytes:
    title: Measurement mode
    field:
      type: scalar
      key: measurement_payload_bytes
      kind: int
      comment: Bytes per generated measurement payload
      default: 1024
      optional: true
  measurement_prbs_seed:
    title: Measurement mode
    field:
      type: scalar
      key: measurement_prbs_seed
      kind: int
      comment: Initial PRBS seed for measurement payload generation
      default: 90
      optional: true
  measurement_packets_per_point:
    title: Measurement mode
    field:
      type: scalar
      key: measurement_packets_per_point
      kind: int
      comment: Packets to send / compare for one measurement epoch
      default: 1
      optional: true
  measurement_max_packets_per_frame:
    title: Measurement mode
    field:
      type: scalar
      key: measurement_max_packets_per_frame
      kind: int
      comment: Max measurement packets pulled per frame; 0 means unlimited
      default: 1
      optional: true
  sensing_on_wire_format:
    title: Sensing FFT
    field:
      type: scalar
      key: sensing_on_wire_format
      kind: string
      comment: Sensing ZMQ sample format
      default: cf32
      optional: true
      options: [cf32, cf16]
  sensing_rx_channels:
    title: Sensing RX Channels
    field:
      type: mapping_list
      key: sensing_rx_channels
      comment: ""
      optional: false
      item_fields:
        - key: usrp_channel
          comment: USRP RX channel index for this sensing path
          kind: int
          default: 1
        - key: device_args
          comment: Per-channel USRP args override (optional)
          kind: string
          default: ""
        - key: clock_source
          comment: Per-channel clock source override (optional)
          kind: string
          default: ""
          options: ["", internal, external, gpsdo]
        - key: time_source
          comment: Per-channel time source override (optional)
          kind: string
          default: ""
          options: ["", internal, external, gpsdo]
        - key: wire_format_rx
          comment: Per-channel wire format override (optional)
          kind: string
          default: ""
          options: ["", sc16, sc8]
        - key: rx_gain
          comment: Per-channel RX gain (dB)
          kind: int
          default: 30
        - key: alignment
          comment: Per-channel timing alignment offset (samples)
          kind: int
          default: 63
        - key: rx_antenna
          comment: RX antenna port (e.g. RX1/RX2/TX/RX)
          kind: string
          default: RX2
          options: [RX1, RX2, TX/RX]
        - key: enable_system_delay_estimation
          comment: If true, this channel runs delay estimation only and disables sensing pipeline
          kind: bool
          default: false
  data_resource_blocks:
    title: Resource Preview
    field:
      type: mapping_list
      key: data_resource_blocks
      comment: Optional payload / sensing-pilot RE rectangles
      allow_omit: true
      optional: true
      planner_kind: payload
      default: []
      item_fields:
        - key: kind
          comment: Block role; payload or sensing_pilot
          kind: string
          default: payload
          options:
            - payload
            - sensing_pilot
        - key: symbol_start
          comment: 0-based absolute frame symbol index
          kind: int
          default: 0
        - key: symbol_count
          comment: Number of OFDM symbols in this block
          kind: int
          default: 1
        - key: subcarrier_start
          comment: 0-based FFT-bin start index
          kind: int
          default: 0
        - key: subcarrier_count
          comment: Number of contiguous subcarriers in this block
          kind: int
          default: 1
  sensing_mask_blocks:
    title: Resource Preview
    field:
      type: mapping_list
      key: sensing_mask_blocks
      comment: Optional compact sensing RE rectangles
      allow_omit: true
      optional: true
      planner_kind: sensing_mask
      default: []
      item_fields:
        - key: symbol_start
          comment: 0-based absolute frame symbol index
          kind: int
          default: 0
        - key: symbol_count
          comment: Number of OFDM symbols in this block
          kind: int
          default: 1
        - key: subcarrier_start
          comment: 0-based FFT-bin start index
          kind: int
          default: 0
        - key: subcarrier_count
          comment: Number of contiguous subcarriers in this block
          kind: int
          default: 1

modulator:
  fft_size:
    title: OFDM Frame
    field:
      type: scalar
      key: fft_size
      kind: int
      comment: FFT size (subcarrier count)
      default: 1024
      optional: true
  cp_length:
    title: OFDM Frame
    field:
      type: scalar
      key: cp_length
      kind: int
      comment: Cyclic prefix length (samples)
      default: 128
      optional: true
  sync_pos:
    title: OFDM Frame
    field:
      type: scalar
      key: sync_pos
      kind: int
      comment: Sync symbol index in one frame
      default: 1
      optional: true
  enable_sec_sync_symbol:
    title: OFDM Frame
    field:
      type: scalar
      key: enable_sec_sync_symbol
      kind: bool
      comment: Reserve sync_pos-1 as a duplicate ZC sync symbol
      default: false
      optional: true
  enable_cfo_training_sequence:
    title: OFDM Frame
    field:
      type: scalar
      key: enable_cfo_training_sequence
      kind: bool
      comment: Reserve sync_pos+1 as a repeated CFO training field
      default: false
      optional: true
  cfo_training_period_samples:
    title: OFDM Frame
    field:
      type: scalar
      key: cfo_training_period_samples
      kind: int
      comment: Repetition period of CFO training field in samples
      default: 16
      optional: true
  num_symbols:
    title: OFDM Frame
    field:
      type: scalar
      key: num_symbols
      kind: int
      comment: Number of OFDM symbols per frame
      default: 100
      optional: true
  sensing_symbol_num:
    title: OFDM Frame
    field:
      type: scalar
      key: sensing_symbol_num
      kind: int
      comment: Number of symbols used in sensing processing
      default: 100
      optional: true
  cuda_mod_pipeline_slots:
    title: OFDM Frame
    field:
      type: scalar
      key: cuda_mod_pipeline_slots
      kind: int
      comment: Number of CUDA modulation pipeline slots
      default: 3
      optional: true
  zc_root:
    title: OFDM Frame
    field:
      type: scalar
      key: zc_root
      kind: int
      comment: Zadoff-Chu root for sync/preamble
      default: 29
      optional: true
  pilot_positions:
    title: OFDM Frame
    field:
      type: flow_list
      key: pilot_positions
      item_kind: int
      comment: Comb-pilot subcarrier indices
      default: [571, 631, 692, 752, 812, 872, 933, 993, 29, 89, 150, 210, 270, 330, 391, 451]
      optional: true
  midframe_pilot_symbols:
    title: OFDM Frame
    field:
      type: flow_list
      key: midframe_pilot_symbols
      item_kind: int
      comment: Mid-frame BPSK pilot symbol indices; comb-pilot RE keep comb-pilot sequence
      default: []
      optional: true
  midframe_pilot_seed:
    title: OFDM Frame
    field:
      type: scalar
      key: midframe_pilot_seed
      kind: int
      comment: Deterministic mid-frame BPSK pilot seed; must match TX/RX
      default: 1296453708
      optional: true
  range_fft_size:
    title: Sensing FFT
    field:
      type: scalar
      key: range_fft_size
      kind: int
      comment: Range FFT size
      default: 1024
      optional: true
  doppler_fft_size:
    title: Sensing FFT
    field:
      type: scalar
      key: doppler_fft_size
      kind: int
      comment: Doppler FFT size
      default: 100
      optional: true
  sensing_output_mode:
    title: Sensing FFT
    field:
      type: scalar
      key: sensing_output_mode
      kind: string
      comment: dense or compact_mask
      default: dense
      optional: true
      options: [dense, compact_mask]
  enable_backend_sensing_processing:
    title: Sensing FFT
    field:
      type: scalar
      key: enable_backend_sensing_processing
      kind: bool
      comment: true lets backend publish RD/CFAR/MD metadata sidecars
      default: false
      optional: true
  sensing_view_range_bins:
    title: Sensing FFT
    field:
      type: scalar
      key: sensing_view_range_bins
      kind: int
      comment: Backend RD view width in range bins; 0 uses full range_fft_size
      default: 0
      optional: true
  sensing_view_doppler_bins:
    title: Sensing FFT
    field:
      type: scalar
      key: sensing_view_doppler_bins
      kind: int
      comment: Backend RD view height in Doppler bins; 0 uses full doppler_fft_size
      default: 0
      optional: true
  sample_rate:
    title: RF / Sampling
    field:
      type: scalar
      key: sample_rate
      kind: int
      comment: Baseband sample rate (Hz)
      default: 50000000
      optional: true
  bandwidth:
    title: RF / Sampling
    field:
      type: scalar
      key: bandwidth
      kind: int
      comment: Analog bandwidth (Hz), usually same as sample_rate
      default: 50000000
      optional: true
  center_freq:
    title: RF / Sampling
    field:
      type: scalar
      key: center_freq
      kind: int
      comment: RF center frequency (Hz)
      default: 2400000000
      optional: true
  tx_gain:
    title: RF / Sampling
    field:
      type: scalar
      key: tx_gain
      kind: int
      comment: TX gain (dB)
      default: 60
      optional: true
  tx_channel:
    title: RF / Sampling
    field:
      type: scalar
      key: tx_channel
      kind: int
      comment: TX channel index on USRP
      default: 0
      optional: true
  device_args:
    title: USRP Device Args
    field:
      type: scalar
      key: device_args
      kind: string
      comment: Shared fallback args
      default: "addr=192.168.40.2, master_clock_rate=200e6, num_recv_frames=2048, num_send_frames=2048"
      optional: true
  tx_device_args:
    title: USRP Device Args
    field:
      type: scalar
      key: tx_device_args
      kind: string
      comment: TX-specific args (empty = use device_args)
      default: ""
      optional: true
  rx_device_args:
    title: USRP Device Args
    field:
      type: scalar
      key: rx_device_args
      kind: string
      comment: Default sensing RX args (empty = use device_args)
      default: ""
      optional: true
  clock_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: clock_source
      kind: string
      comment: Global clock source; internal/external/gpsdo
      default: external
      optional: true
      options: [internal, external, gpsdo]
  time_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: time_source
      kind: string
      comment: Global time source; empty follows clock_source
      default: internal
      optional: true
      options: ["", internal, external, gpsdo]
  tx_clock_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: tx_clock_source
      kind: string
      comment: TX clock source override (optional)
      default: ""
      optional: true
      options: ["", internal, external, gpsdo]
  tx_time_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: tx_time_source
      kind: string
      comment: TX time source override (optional)
      default: ""
      optional: true
      options: ["", internal, external, gpsdo]
  rx_clock_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: rx_clock_source
      kind: string
      comment: Sensing RX clock source override (optional)
      default: ""
      optional: true
      options: ["", internal, external, gpsdo]
  rx_time_source:
    title: Clock / Time Sources
    field:
      type: scalar
      key: rx_time_source
      kind: string
      comment: Sensing RX time source override (optional)
      default: ""
      optional: true
      options: ["", internal, external, gpsdo]
  wire_format_tx:
    title: Wire Format
    field:
      type: scalar
      key: wire_format_tx
      kind: string
      comment: TX wire format; sc16/sc8
      default: sc16
      optional: true
      options: [sc16, sc8]
  wire_format_rx:
    title: Wire Format
    field:
      type: scalar
      key: wire_format_rx
      kind: string
      comment: RX wire format; sc16/sc8
      default: sc16
      optional: true
      options: [sc16, sc8]
  udp_input_ip:
    title: Network Output
    field:
      type: scalar
      key: udp_input_ip
      kind: string
      comment: Bind IP for incoming payload UDP packets
      default: 0.0.0.0
      optional: true
  udp_input_port:
    title: Network Output
    field:
      type: scalar
      key: udp_input_port
      kind: int
      comment: Bind port for incoming payload UDP packets
      default: 50000
      optional: true
  mono_sensing_ip:
    title: Network Output
    field:
      type: scalar
      key: mono_sensing_ip
      kind: string
      comment: Monostatic sensing ZMQ listen IP
      default: 0.0.0.0
      optional: true
  mono_sensing_port:
    title: Network Output
    field:
      type: scalar
      key: mono_sensing_port
      kind: int
      comment: Monostatic sensing ZMQ listen port
      default: 8888
      optional: true
  mono_sensing_output_enabled:
    title: Network Output
    field:
      type: scalar
      key: mono_sensing_output_enabled
      kind: bool
      comment: Enable monostatic sensing ZMQ output
      default: true
      optional: true
  control_port:
    title: Network Output
    field:
      type: scalar
      key: control_port
      kind: int
      comment: ZMQ port for runtime control commands
      default: 9999
      optional: true
  sensing_symbol_stride:
    title: Network Output
    field:
      type: scalar
      key: sensing_symbol_stride
      kind: int
      comment: Default STRD applied at startup before runtime commands
      default: 20
      optional: true
  sensing_rx_channel_count:
    title: Sensing RX Channels
    field:
      type: scalar
      key: sensing_rx_channel_count
      kind: int
      comment: Number of sensing RX channels (0 disables sensing RX)
      default: 1
      optional: true
  tx_circular_buffer_size:
    title: Runtime / Debug
    field:
      type: scalar
      key: tx_circular_buffer_size
      kind: int
      comment: Modulator frame circular buffer capacity
      default: 32
      optional: true
  data_packet_buffer_size:
    title: Runtime / Debug
    field:
      type: scalar
      key: data_packet_buffer_size
      kind: int
      comment: Encoded packet buffer capacity
      default: 32
      optional: true
  paired_frame_queue_size:
    title: Runtime / Debug
    field:
      type: scalar
      key: paired_frame_queue_size
      kind: int
      comment: Per-channel RX/TX pairing queue capacity; keep above tx_circular_buffer_size for RX startup/alignment headroom
      default: 64
      optional: true
  profiling_modules:
    title: Runtime / Debug
    field:
      type: scalar
      key: profiling_modules
      kind: string
      comment: Comma-separated modules to profile (modulation, latency, data_ingest, sensing_proc), or "all"
      default: ""
      optional: true
  cpu_cores:
    title: Runtime / Debug
    field:
      type: cpu_cores
      key: cpu_cores
      comment: Allowed CPU core list
      default: [1, 2, 3, 4, 5, 6]
      optional: true

