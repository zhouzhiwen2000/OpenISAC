- title: Measurement mode
  yaml_key: measurement
  order: 80
  fields:
  - type: scalar
    key: measurement_enable
    kind: bool
    comment: Enable internal PRBS measurement traffic
    default: false
    optional: true
  - type: scalar
    key: measurement_mode
    kind: string
    comment: Measurement payload generator / checker mode
    default: internal_prbs
    optional: true
    options:
    - ''
    - internal_prbs
  - type: scalar
    key: measurement_run_id
    kind: string
    comment: Optional run identifier written to measurement CSV summaries
    default: ''
    optional: true
  - type: scalar
    key: measurement_output_dir
    kind: string
    comment: Optional directory for measurement CSV summaries
    default: ''
    optional: true
  - type: scalar
    key: measurement_payload_bytes
    kind: int
    comment: Bytes per generated measurement payload
    default: 1024
    optional: true
  - type: scalar
    key: measurement_prbs_seed
    kind: int
    comment: Initial PRBS seed for measurement payload generation
    default: 90
    optional: true
  - type: scalar
    key: measurement_packets_per_point
    kind: int
    comment: Packets to send / compare for one measurement epoch
    default: 1
    optional: true
  - type: scalar
    key: measurement_max_packets_per_frame
    kind: int
    comment: Max measurement packets pulled per frame; 0 means unlimited
    default: 1
    optional: true
- title: Resource Preview
  yaml_key: resource_preview
  order: 70
  fields:
  - type: mapping_list
    key: data_resource_blocks
    comment: Optional payload / sensing-pilot RE rectangles
    allow_omit: true
    optional: true
    planner_kind: payload
    default: []
    item_fields:
    - key: kind
      comment: Block role; payload or sensing_pilot
      kind: string
      default: payload
      options:
      - payload
      - sensing_pilot
    - key: symbol_start
      comment: 0-based absolute frame symbol index
      kind: int
      default: 0
    - key: symbol_count
      comment: Number of OFDM symbols in this block
      kind: int
      default: 1
    - key: subcarrier_start
      comment: 0-based FFT-bin start index
      kind: int
      default: 0
    - key: subcarrier_count
      comment: Number of contiguous subcarriers in this block
      kind: int
      default: 1
  - type: mapping_list
    key: mask_blocks
    data_key: sensing.mask_blocks
    comment: Optional compact sensing RE rectangles
    allow_omit: true
    optional: true
    planner_kind: sensing_mask
    default: []
    item_fields:
    - key: symbol_start
      comment: 0-based absolute frame symbol index
      kind: int
      default: 0
    - key: symbol_count
      comment: Number of OFDM symbols in this block
      kind: int
      default: 1
    - key: subcarrier_start
      comment: 0-based FFT-bin start index
      kind: int
      default: 0
    - key: subcarrier_count
      comment: Number of contiguous subcarriers in this block
      kind: int
      default: 1
- title: LDPC decode
  yaml_key: ldpc
  order: 60
  fields:
  - type: scalar
    key: fixed_point
    kind: bool
    comment: int16 (Q16) layered-NMS CPU decoder (~1.6x faster, quant fused into demap); false = float32
    default: false
    optional: true
  - type: scalar
    key: fixed_point_scale
    kind: int
    comment: pow2 multiplier applied to LLRs before int16 saturation (Q16 path only)
    default: 32
    optional: true
bs:
- title: OFDM Frame
  yaml_key: ofdm_frame
  order: 20
  fields:
  - type: scalar
    key: fft_size
    kind: int
    comment: FFT size (subcarrier count)
    default: 1024
    optional: true
  - type: scalar
    key: cp_length
    kind: int
    comment: Cyclic prefix length (samples)
    default: 128
    optional: true
  - type: scalar
    key: sync_pos
    kind: int
    comment: Sync symbol index in one frame
    default: 1
    optional: true
  - type: scalar
    key: enable_sec_sync_symbol
    kind: bool
    comment: Reserve sync_pos-1 as a duplicate ZC sync symbol
    default: false
    optional: true
  - type: scalar
    key: enable_cfo_training_sequence
    kind: bool
    comment: Reserve sync_pos+1 as a repeated CFO training field
    default: false
    optional: true
  - type: scalar
    key: cfo_training_period_samples
    kind: int
    comment: Repetition period of CFO training field in samples
    default: 32
    optional: true
  - type: scalar
    key: num_symbols
    kind: int
    comment: Number of OFDM symbols per frame
    default: 100
    optional: true
  - type: scalar
    key: sensing_symbol_num
    kind: int
    comment: Number of symbols used in sensing processing
    default: 100
    optional: true
  - type: scalar
    key: zc_root
    kind: int
    comment: Zadoff-Chu root for sync/preamble
    default: 29
    optional: true
  - type: flow_list
    key: pilot_positions
    item_kind: int
    comment: Comb-pilot subcarrier indices
    default:
    - 571
    - 631
    - 692
    - 752
    - 812
    - 872
    - 933
    - 993
    - 29
    - 89
    - 150
    - 210
    - 270
    - 330
    - 391
    - 451
    optional: true
  - type: flow_list
    key: midframe_pilot_symbols
    item_kind: int
    comment: Mid-frame BPSK pilot symbol indices; comb-pilot RE keep comb-pilot sequence
    default: []
    optional: true
  - type: scalar
    key: midframe_pilot_seed
    kind: int
    comment: Deterministic mid-frame BPSK pilot seed; must match TX/RX
    default: 1296453708
    optional: true
- title: CUDA
  yaml_key: cuda
  order: 25
  fields:
  - type: scalar
    key: cuda_mod_pipeline_slots
    kind: int
    comment: Number of CUDA modulation pipeline slots
    default: 3
    optional: true
- title: Sensing
  yaml_key: sensing
  order: 50
  fields:
  - type: scalar
    key: rx_wire_format
    data_key: sensing.rx_wire_format
    kind: string
    comment: Sensing RX default wire format; sc16/sc8
    default: sc16
    optional: true
    options:
    - sc16
    - sc8
  - type: scalar
    key: rx_device_args
    data_key: sensing.rx_device_args
    kind: string
    comment: Default sensing RX args (empty = use device_args)
    default: ''
    optional: true
  - type: scalar
    key: rx_clock_source
    data_key: sensing.rx_clock_source
    kind: string
    comment: Sensing RX clock source override (optional)
    default: ''
    optional: true
    options:
    - ''
    - internal
    - external
    - gpsdo
  - type: scalar
    key: rx_time_source
    data_key: sensing.rx_time_source
    kind: string
    comment: Sensing RX time source override (optional)
    default: ''
    optional: true
    options:
    - ''
    - internal
    - external
    - gpsdo
  - type: scalar
    key: rx_channel_count
    data_key: sensing.rx_channel_count
    kind: int
    comment: Number of sensing RX channels (0 disables sensing RX)
    default: 1
    optional: true
  - type: mapping_list
    key: rx_channels
    data_key: sensing.rx_channels
    comment: ''
    optional: false
    item_fields:
    - key: usrp_channel
      comment: USRP RX channel index for this sensing path
      kind: int
      default: 1
    - key: device_args
      comment: Per-channel USRP args override (optional)
      kind: string
      default: ''
    - key: clock_source
      comment: Per-channel clock source override (optional)
      kind: string
      default: ''
      options:
      - ''
      - internal
      - external
      - gpsdo
    - key: time_source
      comment: Per-channel time source override (optional)
      kind: string
      default: ''
      options:
      - ''
      - internal
      - external
      - gpsdo
    - key: wire_format
      comment: Per-channel wire format override (optional)
      kind: string
      default: ''
      options:
      - ''
      - sc16
      - sc8
    - key: rx_gain
      comment: Per-channel RX gain (dB)
      kind: int
      default: 30
    - key: alignment
      comment: Per-channel timing alignment offset (samples)
      kind: int
      default: 63
    - key: rx_antenna
      comment: RX antenna port (e.g. RX1/RX2/TX/RX)
      kind: string
      default: RX2
      options:
      - RX1
      - RX2
      - TX/RX
    - key: enable_system_delay_estimation
      comment: If true, this channel runs delay estimation only and disables sensing pipeline
      kind: bool
      default: false
    - key: rx_cpu_core
      comment: CPU core for SensingChannel::_rx_loop (-1 disables explicit binding)
      kind: int
      default: -1
    - key: processing_cpu_core
      comment: CPU core for SensingChannel::_sensing_loop (-1 disables explicit binding)
      kind: int
      default: -1
  - type: scalar
    key: on_wire_format
    data_key: sensing.on_wire_format
    kind: string
    comment: Sensing ZMQ sample format
    default: cf32
    optional: true
    options:
    - cf32
    - cf16
  - type: scalar
    key: range_fft_size
    kind: int
    comment: Range FFT size
    default: 1024
    optional: true
  - type: scalar
    key: doppler_fft_size
    kind: int
    comment: Doppler FFT size
    default: 100
    optional: true
  - type: scalar
    key: output_mode
    data_key: sensing.output_mode
    kind: string
    comment: dense or compact_mask
    default: dense
    optional: true
    options:
    - dense
    - compact_mask
  - type: scalar
    key: backend_processing_enabled
    data_key: sensing.backend_processing_enabled
    kind: bool
    comment: true lets backend publish RD/CFAR/MD metadata sidecars
    default: false
    optional: true
  - type: scalar
    key: view_range_bins
    data_key: sensing.view_range_bins
    kind: int
    comment: Backend RD view width in range bins; 0 uses full range_fft_size
    default: 50
    optional: true
  - type: scalar
    key: view_doppler_bins
    data_key: sensing.view_doppler_bins
    kind: int
    comment: Backend RD view height in Doppler bins; 0 uses full doppler_fft_size
    default: 50
    optional: true
  - type: scalar
    key: symbol_stride
    data_key: sensing.symbol_stride
    kind: int
    comment: Default STRD applied at startup before runtime commands
    default: 20
    optional: true
  - type: scalar
    key: paired_frame_queue_size
    kind: int
    comment: Per-channel RX/TX pairing queue capacity; keep above tx_circular_buffer_size for RX startup/alignment headroom
    default: 64
    optional: true
- title: RF / Sampling
  yaml_key: rf_sampling
  order: 12
  fields:
  - type: scalar
    key: sample_rate
    kind: int
    comment: Baseband sample rate (Hz)
    default: 50000000
    optional: true
  - type: scalar
    key: bandwidth
    kind: int
    comment: Analog bandwidth (Hz), usually same as sample_rate
    default: 50000000
    optional: true
- title: USRP Device Args
  yaml_key: usrp_device
  order: 13
  fields:
  - type: scalar
    key: device_args
    kind: string
    comment: Shared fallback args
    default: addr=192.168.40.2, master_clock_rate=200e6, num_recv_frames=2048, num_send_frames=2048
    optional: true
- title: Clock / Time Sources
  yaml_key: clock_time
  order: 14
  fields:
  - type: scalar
    key: clock_source
    kind: string
    comment: Global clock source; internal/external/gpsdo
    default: external
    optional: true
    options:
    - internal
    - external
    - gpsdo
  - type: scalar
    key: time_source
    kind: string
    comment: Global time source; empty follows clock_source
    default: internal
    optional: true
    options:
    - ''
    - internal
    - external
    - gpsdo
- title: Downlink
  yaml_key: downlink
  order: 30
  fields:
  - type: scalar
    key: center_freq
    kind: int
    comment: RF center frequency (Hz)
    default: 2400000000
    optional: true
  - type: scalar
    key: tx_gain
    kind: int
    comment: TX gain (dB)
    default: 60
    optional: true
  - type: scalar
    key: tx_channel
    kind: int
    comment: TX channel index on USRP
    default: 67.0
    optional: true
  - type: scalar
    key: tx_device_args
    kind: string
    comment: TX-specific args (empty = use device_args)
    default: ''
    optional: true
  - type: scalar
    key: tx_clock_source
    kind: string
    comment: TX clock source override (optional)
    default: ''
    optional: true
    options:
    - ''
    - internal
    - external
    - gpsdo
  - type: scalar
    key: tx_time_source
    kind: string
    comment: TX time source override (optional)
    default: ''
    optional: true
    options:
    - ''
    - internal
    - external
    - gpsdo
  - type: scalar
    key: wire_format_tx
    kind: string
    comment: TX wire format; sc16/sc8
    default: sc16
    optional: true
    options:
    - sc16
    - sc8
  - type: scalar
    key: tx_circular_buffer_size
    kind: int
    comment: BS frame circular buffer capacity
    default: 32
    optional: true
  - type: scalar
    key: data_packet_buffer_size
    kind: int
    comment: Encoded packet buffer capacity
    default: 256
    optional: true
  - type: scalar
    key: arq_enabled
    data_key: downlink.arq_enabled
    kind: bool
    comment: Enable downlink ARQ on the BS transmitter
    default: false
    optional: true
  - type: scalar
    key: arq_window_packets
    data_key: downlink.arq_window_packets
    kind: int
    comment: Downlink ARQ outstanding packet window [1, 32767]
    default: 256
    optional: true
    enabled_if:
      key: downlink.arq_enabled
      value: true
  - type: scalar
    key: arq_retransmit_timeout_ms
    data_key: downlink.arq_retransmit_timeout_ms
