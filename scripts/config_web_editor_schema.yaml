    optional: true
  - type: scalar
    key: vofa_debug_ip
    kind: string
    comment: VOFA+ debug output IP
    default: ''
    optional: true
  - type: scalar
    key: vofa_debug_port
    kind: int
    comment: VOFA+ debug output port
    default: 12347
    optional: true
