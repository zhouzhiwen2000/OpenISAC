- title: Uplink
  yaml_key: uplink
  order: 40
  fields:
  - type: scalar
    key: enabled
    data_key: uplink.enabled
    kind: bool
    comment: Enable UE-to-BS uplink / duplex path
    default: false
    optional: true
  - type: scalar
    key: duplex_mode
    kind: string
    comment: Uplink carrier/window scheme (tdd = shared downlink carrier with a symbol window, fdd = separate carrier with
      continuous full-frame uplink)
    default: tdd
    optional: true
    options:
    - tdd
    - fdd
  - type: uplink_mapping
    key: uplink
    comment: BS-side uplink / duplex settings
    default:
      symbol_start: 90
      symbol_count: 10
      guard_symbols: 1
      center_freq: 2500000000
      debug_self_channel: false
    optional: true
    scalar_fields:
    - key: symbol_start
      comment: TDD only; first uplink symbol in the downlink frame
      kind: int
      default: 90
      optional: true
    - key: symbol_count
      comment: TDD only; uplink window length in OFDM symbols; 0 disables TDD uplink
      kind: int
      default: 10
      optional: true
    - key: guard_symbols
      comment: TDD only; leading guard symbols inside the uplink window
      kind: int
      default: 1
      optional: true
    - key: center_freq
      comment: FDD only; uplink carrier. TDD uses the downlink center frequency. Displayed in GHz, stored in Hz.
      kind: float
      default: 2500000000
      optional: true
    - key: debug_self_channel
      comment: Estimate BS self-TX leakage channel from the uplink RX window using current DUTI
      kind: bool
      default: false
      optional: true
  - type: scalar
    key: equalizer_mode
    kind: string
    comment: Communication equalizer inverse mode
    default: mmse
    optional: true
    options:
    - zf
    - mmse
  - type: scalar
    key: channel_tracking_mode
    kind: string
    comment: Per-symbol comb-pilot tracking mode
    default: pilot_phase
    optional: true
    options:
    - disabled
    - pilot_phase
  - type: scalar
    key: equalizer_mag_floor
    kind: float
    comment: Lower bound for |H|^2 during channel inversion
    default: 1.0e-06
    optional: true
  - type: scalar
    key: channel_tracking_min_pilot_snr
    kind: float
    comment: Minimum comb-pilot residual power accepted by per-symbol tracking
    default: 0.0001
    optional: true
  - type: scalar
    key: rx_gain
    kind: int
    comment: Uplink RX gain (dB)
    default: 10
    optional: true
  - type: scalar
    key: rx_channel
    data_key: uplink.rx_channel
    kind: int
    comment: Uplink RX channel index on USRP
    default: 67.0
    optional: true
  - type: scalar
    key: rx_wire_format
    data_key: uplink.rx_wire_format
    kind: string
    comment: Uplink RX wire format; sc16/sc8
    default: sc16
    optional: true
    options:
    - sc16
    - sc8
  - type: scalar
    key: rx_device_args
    data_key: uplink.rx_device_args
    kind: string
    comment: Uplink RX-specific args (empty = use TX/shared device)
    default: ''
    optional: true
  - type: scalar
    key: rx_clock_source
    data_key: uplink.rx_clock_source
    kind: string
    comment: Uplink RX clock source override (optional)
    default: ''
    optional: true
    options:
    - ''
    - internal
    - external
    - gpsdo
  - type: scalar
    key: rx_time_source
    data_key: uplink.rx_time_source
    kind: string
    comment: Uplink RX time source override (optional)
    default: ''
    optional: true
    options:
    - ''
    - internal
    - external
    - gpsdo
  - type: scalar
    key: rx_agc_enable
    kind: bool
    comment: Enable uplink hardware RX AGC driven by delay-spectrum peak
    default: false
    optional: true
  - type: scalar
    key: rx_agc_low_threshold_db
    kind: float
    comment: Increase uplink RX gain when filtered delay-spectrum peak falls below this threshold (dB)
    default: 14.0
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: rx_agc_enable
        value: true
  - type: scalar
    key: rx_agc_high_threshold_db
    kind: float
    comment: Decrease uplink RX gain when filtered delay-spectrum peak rises above this threshold (dB)
    default: 16.0
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: rx_agc_enable
        value: true
  - type: scalar
    key: rx_agc_max_step_db
    kind: float
    comment: Maximum uplink RX gain step per AGC update (dB)
    default: 1.0
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: rx_agc_enable
        value: true
  - type: scalar
    key: rx_agc_update_frames
    kind: int
    comment: Apply uplink AGC at most once every N processed frames
    default: 4
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: rx_agc_enable
        value: true
  - type: scalar
    key: bs_dl_ul_timing_diff
    kind: int
    comment: BS DL/UL timing difference (samples) — also adjustable at runtime via DUTI
    default: 63
    optional: true
  - type: scalar
    key: ertm_to_enable
    data_key: uplink.ertm_to_enable
    kind: bool
    comment: Enable eRTM TO estimation payload injection and UE-side TO logs
    default: false
    optional: true
    enabled_if:
      key: uplink.enabled
      value: true
  - type: scalar
    key: ertm_report_interval_frames
    data_key: uplink.ertm_report_interval_frames
    kind: int
    comment: BS eRTM payload/report cadence in downlink frames
    default: 32
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.ertm_to_enable
        value: true
  - type: scalar
    key: arq_enabled
    data_key: uplink.arq_enabled
    kind: bool
    comment: Enable uplink ARQ on the BS receiver
    default: false
    optional: true
  - type: scalar
    key: arq_ordered_delivery
    data_key: uplink.arq_ordered_delivery
    kind: bool
    comment: Buffer uplink packets and deliver in sequence order
    default: false
    optional: true
    enabled_if:
      key: uplink.arq_enabled
      value: true
  - type: scalar
    key: arq_window_packets
    data_key: uplink.arq_window_packets
    kind: int
    comment: Uplink ARQ receive/reorder window [1, 32767]
    default: 256
    optional: true
    enabled_if:
      key: uplink.arq_enabled
      value: true
  - type: scalar
    key: arq_feedback_interval_ms
    data_key: uplink.arq_feedback_interval_ms
    kind: int
    comment: Uplink ARQ ACK feedback interval in ms
    default: 10
    optional: true
    enabled_if:
      key: uplink.arq_enabled
      value: true
