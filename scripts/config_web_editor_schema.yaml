      comment: FDD only; uplink carrier. TDD uses the downlink center frequency. Displayed in GHz, stored in Hz.
      kind: float
      default: 2500000000
      optional: true
    - key: debug_self_channel
      comment: Estimate UE self-TX leakage channel from the RX window using current TADV
      kind: bool
      default: false
      optional: true
    - key: debug_self_scan_spectrum
      comment: Publish a peak-centered self-ZC matched-filter slice + metadata (needs debug_self_channel); view with scripts/plot_uplink_self_scan.py
      kind: bool
      default: false
      optional: true
    - key: debug_self_scan_slice_samples
      comment: Correlation samples around the peak shipped to the self-scan viewer; 0 = one OFDM symbol (fft_size + cp_length)
      kind: int
      default: 0
      optional: true
      enabled_if:
        key: uplink.debug_self_scan_spectrum
        value: true
  - type: scalar
    key: tx_gain
    kind: int
    comment: Uplink TX gain (dB)
    default: 60
    optional: true
  - type: scalar
    key: tx_channel
    kind: int
    comment: Uplink TX channel index on USRP
    default: 0
    optional: true
  - type: scalar
    key: wire_format_tx
    kind: string
    comment: Uplink TX wire format; sc16/sc8
    default: sc16
    optional: true
    options:
    - sc16
    - sc8
  - type: scalar
    key: arq_enabled
    data_key: uplink.arq_enabled
    kind: bool
    comment: Enable uplink ARQ on the UE transmitter
    default: false
    optional: true
  - type: scalar
    key: arq_window_packets
    data_key: uplink.arq_window_packets
    kind: int
    comment: Uplink ARQ outstanding packet window [1, 32767]
    default: 256
    optional: true
    enabled_if:
      key: uplink.arq_enabled
      value: true
  - type: scalar
    key: arq_retransmit_timeout_ms
    data_key: uplink.arq_retransmit_timeout_ms
    kind: int
    comment: Uplink ARQ retransmit timeout in ms
    default: 100
    optional: true
    enabled_if:
      key: uplink.arq_enabled
      value: true
  - type: scalar
    key: arq_max_retries
    data_key: uplink.arq_max_retries
    kind: int
    comment: Uplink ARQ max retransmit retries; 0 = unlimited within window
    default: 5
    optional: true
    enabled_if:
      key: uplink.arq_enabled
      value: true
  - type: scalar
    key: ue_timing_advance
    kind: int
    comment: UE Timing Advance (samples) — also adjustable at runtime via TADV
    default: 0
    optional: true
  - type: scalar
    key: ertm_to_enable
    data_key: uplink.ertm_to_enable
    kind: bool
    comment: Enable eRTM TO estimation payload injection and UE-side TO logs
    default: false
    optional: true
    enabled_if:
      key: uplink.enabled
      value: true
  - type: scalar
    key: ertm_timing_metric
    data_key: uplink.ertm_timing_metric
    kind: string
    comment: Differential-TO metric; delay_magnitude is phase-robust, maximum_likelihood uses coherent complex channel correlation
    default: delay_magnitude
    optional: true
    options:
    - delay_magnitude
    - maximum_likelihood
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.ertm_to_enable
        value: true
  - type: scalar
    key: ertm_delay_oversample_factor
    data_key: uplink.ertm_delay_oversample_factor
    kind: int
    comment: eRTM delay-spectrum IFFT oversampling factor; 10 preserves the legacy 10x zero-padding
    default: 10
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.ertm_to_enable
        value: true
  - type: scalar
    key: ertm_dl_rf_delay_samples
    data_key: uplink.ertm_dl_rf_delay_samples
    kind: float
    comment: Calibrated downlink RF-chain delay for eRTM TO estimation (samples)
    default: 0
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.ertm_to_enable
        value: true
  - type: scalar
    key: ertm_ul_rf_delay_samples
    data_key: uplink.ertm_ul_rf_delay_samples
    kind: float
    comment: Calibrated uplink RF-chain delay for eRTM TO estimation (samples)
    default: 0
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.ertm_to_enable
        value: true
  - type: scalar
    key: ertm_debug_output_enabled
    data_key: uplink.ertm_debug_output_enabled
    kind: bool
    comment: Enable UE-side eRTM debug ZMQ output with uplink/downlink delay spectra and correlation spectrum
    default: false
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.ertm_to_enable
        value: true
  - type: scalar
    key: ertm_report_interval_frames
    data_key: uplink.ertm_report_interval_frames
    kind: int
    comment: BS eRTM payload/report cadence in downlink frames
    default: 32
    optional: true
    enabled_if:
      all:
      - key: uplink.enabled
        value: true
      - key: uplink.ertm_to_enable
        value: true
- title: Sync / Tracking
  yaml_key: sync_tracking
  order: 45
  fields:
  - type: scalar
    key: sync_queue_size
    kind: int
    comment: Capacity of the sync-search batch queue
    default: 32
    optional: true
  - type: scalar
    key: sync_cfo_alias_search_range_hz
    kind: float
    comment: Max absolute CFO range covered by sync alias search (Hz)
    default: 800000.0
    optional: true
  - type: scalar
    key: reset_hold_s
    kind: float
    comment: Persistent invalid-delay duration before forcing a hard reset (s)
    default: 0.5
    optional: true
  - type: scalar
    key: software_sync
    kind: bool
    comment: Enable software sync tracking
    default: true
    optional: true
  - type: scalar
    key: predictive_delay
    kind: bool
    comment: Enable CFO-based predictive delay compensation during alignment/tracking
    default: true
    optional: true
  - type: scalar
    key: hardware_sync
    kind: bool
    comment: Enable hardware sync mode
    default: false
    optional: true
  - type: scalar
    key: hardware_sync_tty
    kind: string
    comment: Serial device used by hardware sync controller
    default: /dev/ttyUSB0
    optional: true
  - type: scalar
    key: ocxo_pi_kp_fast
    kind: float
    comment: Fast-stage OCXO PI proportional gain (Kp)
    default: 30.0
    optional: true
  - type: scalar
    key: ocxo_pi_ki_fast
    kind: float
    comment: Fast-stage OCXO PI integral gain (Ki)
    default: 1.0
    optional: true
  - type: scalar
    key: ocxo_pi_kp_slow
    kind: float
    comment: Slow-stage OCXO PI proportional gain (Kp)
    default: 30.0
    optional: true
  - type: scalar
    key: ocxo_pi_ki_slow
    kind: float
    comment: Slow-stage OCXO PI integral gain (Ki)
    default: 0.05
    optional: true
  - type: scalar
    key: ocxo_pi_switch_abs_error_ppm
    kind: float
    comment: Switch to slow stage when absolute error_ppm is below this threshold
    default: 0.0002
    optional: true
  - type: scalar
    key: ocxo_pi_switch_hold_s
    kind: float
    comment: Required continuous hold time below threshold before switching (s)
    default: 60.0
    optional: true
  - type: scalar
    key: ocxo_pi_max_step_fast_ppm
    kind: float
    comment: Fast-stage max OCXO adjustment per update (ppm)
    default: 0.01
    optional: true
  - type: scalar
    key: ocxo_pi_max_step_slow_ppm
    kind: float
    comment: Slow-stage max OCXO adjustment per update (ppm)
    default: 0.01
    optional: true
  - type: scalar
    key: akf_enable
    kind: bool
    comment: Enable adaptive Kalman filter for hardware error_ppm
    default: true
    optional: true
  - type: scalar
    key: akf_bootstrap_frames
    kind: int
    comment: Cold-start frame count before AKF enters normal update
    default: 64
    optional: true
  - type: scalar
    key: akf_innovation_window
    kind: int
    comment: Innovation history window used in ACF/LS adaptation
    default: 64
    optional: true
  - type: scalar
    key: akf_max_lag
    kind: int
    comment: Maximum innovation autocorrelation lag
    default: 4
    optional: true
  - type: scalar
    key: akf_adapt_interval
    kind: int
    comment: Frames between adaptive Q/R least-squares updates
    default: 64
    optional: true
  - type: scalar
    key: akf_gate_sigma
    kind: float
    comment: Innovation gating threshold in sigma units
    default: 3.0
    optional: true
  - type: scalar
    key: akf_tikhonov_lambda
    kind: float
    comment: Tikhonov regularization coefficient for LS
    default: 0.001
    optional: true
  - type: scalar
    key: akf_update_smooth
    kind: float
    comment: Exponential smoothing for Q/R update
    default: 0.2
    optional: true
  - type: scalar
    key: akf_q_wf_min
    kind: float
    comment: Lower bound of white-frequency-noise coefficient
    default: 1.0e-10
    optional: true
  - type: scalar
    key: akf_q_wf_max
    kind: float
    comment: Upper bound of white-frequency-noise coefficient
    default: 1.0e2
    optional: true
  - type: scalar
    key: akf_q_rw_min
    kind: float
    comment: Lower bound of random-walk-frequency-noise coefficient
    default: 1.0e-12
    optional: true
  - type: scalar
    key: akf_q_rw_max
    kind: float
    comment: Upper bound of random-walk-frequency-noise coefficient
    default: 1.0e1
    optional: true
  - type: scalar
    key: akf_r_min
    kind: float
    comment: Lower bound of observation noise variance R
    default: 1.0e-08
    optional: true
  - type: scalar
    key: akf_r_max
    kind: float
    comment: Upper bound of observation noise variance R
    default: 1.0e3
    optional: true
  - type: scalar
    key: desired_peak_pos
    kind: int
    comment: Target delay-peak index for alignment
    default: 20
    optional: true
- title: Network
  yaml_key: network_output
  order: 90
  fields:
  - type: scalar
    key: udp_input_ip
    kind: string
    comment: UE uplink payload UDP bind IP
    default: 0.0.0.0
    optional: true
  - type: scalar
    key: udp_input_port
    kind: int
    comment: UE uplink payload UDP bind port
    default: 50002
    optional: true
  - type: scalar
    key: udp_output_ip
    kind: string
    comment: UE decoded downlink payload UDP destination IP (empty = use default_out_ip)
    default: ''
    optional: true
  - type: scalar
    key: udp_output_port
    kind: int
    comment: UE decoded downlink payload UDP destination port
    default: 50001
    optional: true
  - type: scalar
    key: udp_egress_pacer_enabled
    kind: bool
    comment: Enable queued pacing for decoded payload UDP output
    default: false
    optional: true
  - type: scalar
    key: udp_egress_pacer_target_mbps
    kind: float
    comment: UDP egress pacer target Mbps; 0 = auto-estimate
    default: 0
    optional: true
    enabled_if:
      key: udp_egress_pacer_enabled
      value: true
  - type: scalar
    key: udp_egress_pacer_queue_packets
    kind: int
    comment: UDP egress pacer queue capacity in datagrams
    default: 10240
    optional: true
    enabled_if:
      key: udp_egress_pacer_enabled
      value: true
  - type: scalar
    key: udp_egress_pacer_max_delay_ms
    kind: float
    comment: UDP egress pacer max queued packet age in ms; 0 disables age drops
    default: 0
    optional: true
    enabled_if:
      key: udp_egress_pacer_enabled
      value: true
  - type: scalar
    key: self_channel_ip
    kind: string
    comment: UE self-channel ZMQ listen IP
    default: 0.0.0.0
    optional: true
  - type: scalar
    key: self_channel_port
