# ===== Radio backend =====
radio:
  radio_backend: uhd  # Radio I/O backend; uhd = real USRP, sim = channel simulator

# ===== OFDM Frame =====
ofdm_frame:
  fft_size: 1024  # FFT size (subcarrier count)
  cp_length: 128  # Cyclic prefix length (samples)
  sync_pos: 1  # Sync symbol index in one frame
  enable_sec_sync_symbol: false  # Reserve sync_pos-1 as a duplicate ZC sync symbol
  enable_cfo_training_sequence: false  # Use sync_pos+1 CFO field to deambiguate CFO aliases
  cfo_training_period_samples: 16  # Repetition period of CFO training field in samples
  num_symbols: 100  # Number of OFDM symbols per frame
  sensing_symbol_num: 100  # Number of symbols used in sensing processing
  frame_queue_size: 128  # Capacity of the demodulated RX frame queue
  zc_root: 29  # Zadoff-Chu root for sync/preamble
  pilot_positions: [571, 631, 692, 752, 812, 872, 933, 993, 29, 89, 150, 210, 270, 330, 391, 451]  # Comb-pilot subcarrier indices
  midframe_pilot_symbols: []  # Mid-frame BPSK pilot symbol indices; comb-pilot RE keep comb-pilot sequence
  midframe_pilot_seed: 1296453708  # Deterministic mid-frame BPSK pilot seed; must match TX/RX

# ===== CUDA =====
cuda:
  cuda_demod_pipeline_slots: 3  # Number of CUDA demodulation pipeline slots
  cuda_ldpc_decoder_backend: gpu  # CUDA demod LDPC decoder backend
  cuda_ldpc_worker_buffers: 3  # Number of CUDA LDPC async worker batch buffers
  cuda_ldpc_cross_frame_flush_frames: 2  # Max frames accumulated before CUDA LDPC batch decode
  cuda_ldpc_cross_frame_flush_us: 1000.0  # Max CUDA LDPC cross-frame batch wait time in microseconds

# ===== Sensing =====
sensing:
  enable_bi_sensing: false  # Enable bistatic sensing processing pipeline
  range_fft_size: 1024  # Range FFT size
  doppler_fft_size: 100  # Doppler FFT size
  sensing_output_mode: dense  # dense or compact_mask
  enable_backend_sensing_processing: false  # true lets backend publish RD/CFAR/MD metadata sidecars
  sensing_symbol_stride: 20  # Default STRD applied at startup before runtime commands

# ===== RF / Sampling =====
rf_sampling:
  sample_rate: 50000000  # Baseband sample rate (Hz)
  bandwidth: 50000000  # Analog bandwidth (Hz), usually same as sample_rate
  rx_agc_enable: true  # Enable hardware RX AGC driven by delay-spectrum peak
  rx_agc_low_threshold_db: 14.0  # Increase gain when filtered delay-spectrum peak falls below this threshold (dB)
  rx_agc_high_threshold_db: 16.0  # Decrease gain when filtered delay-spectrum peak rises above this threshold (dB)
  rx_agc_max_step_db: 1.0  # Maximum RX gain step per AGC update (dB)
  rx_agc_update_frames: 4  # Apply AGC at most once every N processed frames
  rx_gain: 10  # RX gain (dB)

# ===== USRP Device / Link =====
usrp_device:
  device_args: "addr=192.168.30.2, master_clock_rate=200e6, num_recv_frames=2048, num_send_frames=2048"  # USRP args
  clock_source: external  # Clock source; internal/external/gpsdo

# ===== Downlink =====
downlink:
  center_freq: 2400000000  # RF center frequency (Hz)
  downlink_rx_wire_format: sc16  # Downlink RX wire format; sc16/sc8
  rx_channel: 0  # RX channel index on USRP
  equalizer_mode: mmse  # Communication equalizer inverse mode
  channel_tracking_mode: pilot_phase  # Per-symbol comb-pilot tracking mode
  equalizer_mag_floor: 1e-06  # Lower bound for |H|^2 during channel inversion
  channel_tracking_min_pilot_snr: 0.0001  # Minimum comb-pilot residual power accepted by per-symbol tracking

# ===== Uplink =====
uplink:
  enable_uplink: true  # Enable UE-to-BS uplink / duplex path
  duplex_mode: tdd  # Uplink carrier/window scheme (tdd = shared downlink carrier with a symbol window, fdd = separate carrier with continuous full-frame uplink)
  uplink_idle_waveform: random_qpsk  # UE uplink idle waveform when no UDP payload is queued
  symbol_start: 90  # TDD only; first uplink symbol in the downlink frame
  symbol_count: 10  # TDD only; uplink window length in OFDM symbols; 0 disables TDD uplink
  guard_symbols: 1  # TDD only; leading guard symbols inside the uplink window
  debug_self_channel: true  # Estimate UE self-TX leakage channel from the RX window using current TADV
  tx_gain: 30  # Uplink TX gain (dB)
  tx_channel: 0  # Uplink TX channel index on USRP
  wire_format_tx: sc16  # Uplink TX wire format; sc16/sc8
  ue_timing_advance: 0  # UE Timing Advance (samples) — also adjustable at runtime via TADV

# ===== Sync / Tracking =====
sync_tracking:
  sync_queue_size: 32  # Capacity of the sync-search batch queue
  sync_cfo_alias_search_range_hz: 800000.0  # Max absolute CFO range covered by sync alias search (Hz)
  reset_hold_s: 0.5  # Persistent invalid-delay duration before forcing a hard reset (s)
  software_sync: true  # Enable software sync tracking
  predictive_delay: true  # Enable CFO-based predictive delay compensation during alignment/tracking
  hardware_sync: false  # Enable hardware sync mode
  hardware_sync_tty: /dev/ttyUSB0  # Serial device used by hardware sync controller
  ocxo_pi_kp_fast: 30.0  # Fast-stage OCXO PI proportional gain (Kp)
  ocxo_pi_ki_fast: 1.0  # Fast-stage OCXO PI integral gain (Ki)
  ocxo_pi_kp_slow: 30.0  # Slow-stage OCXO PI proportional gain (Kp)
  ocxo_pi_ki_slow: 0.05  # Slow-stage OCXO PI integral gain (Ki)
  ocxo_pi_switch_abs_error_ppm: 0.0002  # Switch to slow stage when absolute error_ppm is below this threshold
  ocxo_pi_switch_hold_s: 60.0  # Required continuous hold time below threshold before switching (s)
  ocxo_pi_max_step_fast_ppm: 0.01  # Fast-stage max OCXO adjustment per update (ppm)
  ocxo_pi_max_step_slow_ppm: 0.01  # Slow-stage max OCXO adjustment per update (ppm)
  akf_enable: true  # Enable adaptive Kalman filter for hardware error_ppm
  akf_bootstrap_frames: 64  # Cold-start frame count before AKF enters normal update
  akf_innovation_window: 64  # Innovation history window used in ACF/LS adaptation
  akf_max_lag: 4  # Maximum innovation autocorrelation lag
  akf_adapt_interval: 64  # Frames between adaptive Q/R least-squares updates
  akf_gate_sigma: 3.0  # Innovation gating threshold in sigma units
  akf_tikhonov_lambda: 0.001  # Tikhonov regularization coefficient for LS
  akf_update_smooth: 0.2  # Exponential smoothing for Q/R update
  akf_q_wf_min: 1e-10  # Lower bound of white-frequency-noise coefficient
  akf_q_wf_max: 100.0  # Upper bound of white-frequency-noise coefficient
  akf_q_rw_min: 1e-12  # Lower bound of random-walk-frequency-noise coefficient
  akf_q_rw_max: 10.0  # Upper bound of random-walk-frequency-noise coefficient
  akf_r_min: 1e-08  # Lower bound of observation noise variance R
  akf_r_max: 1000.0  # Upper bound of observation noise variance R
  desired_peak_pos: 20  # Target delay-peak index for alignment

# ===== Measurement mode =====
measurement:
  measurement_enable: false  # Enable internal PRBS measurement traffic

# ===== Network =====
network_output:
  self_channel_ip: 0.0.0.0  # UE self-channel ZMQ listen IP
  self_channel_port: 12350  # UE self-channel output port
  self_pdf_ip: 0.0.0.0  # UE self delay-spectrum ZMQ listen IP
  self_pdf_port: 12351  # UE self delay-spectrum output port
  bi_sensing_output_enabled: false  # Enable bistatic sensing ZMQ output
  bi_sensing_ip: 0.0.0.0  # Bistatic sensing/control ZMQ bind IP
  bi_sensing_port: 8889  # Bistatic sensing ZMQ output port
  control_port: 10001  # ZMQ port for runtime control commands
  channel_ip: 0.0.0.0  # Channel-estimate ZMQ listen IP
  channel_port: 12348  # Channel-estimate output port
  pdf_ip: 0.0.0.0  # Delay-spectrum ZMQ listen IP
  pdf_port: 12349  # Delay-spectrum output port
  constellation_ip: 0.0.0.0  # Constellation ZMQ listen IP
  constellation_port: 12346  # Constellation output port
  udp_input_ip: 0.0.0.0  # UE uplink payload UDP bind IP
  udp_input_port: 50002  # UE uplink payload UDP bind port
  udp_output_ip: ""  # UE decoded downlink payload UDP destination IP (empty = use default_out_ip)
  udp_output_port: 50001  # UE decoded downlink payload UDP destination port

# ===== CPU Cores =====
cpu_cores:
  downlink_cpu_cores: [5, 6, -1, 7]  # UE downlink CPU cores: [rx_proc, process_proc, sensing_process_proc, bit_processing_proc]
  uplink_cpu_cores: [-1, 13, 14]  # UE uplink CPU cores: [UplinkTxEngine UDP ingest, modulation, TX send]
  main_cpu_core: 15  # Main-thread CPU core (-1 disables explicit binding)

# ===== Runtime / Debug =====
runtime:
  default_out_ip: 127.0.0.1  # Default destination IP for UDP payload and VOFA+ debug outputs
  vofa_debug_ip: ""  # VOFA+ debug output IP
  vofa_debug_port: 12347  # VOFA+ debug output port
  profiling_modules: ""  # Comma-separated modules to profile, or "all"
