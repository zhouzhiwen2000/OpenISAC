# OFDM Modulator Configuration (X310 TX/RX)

# ===== OFDM Frame =====
fft_size: 1024                 # FFT size (subcarrier count)
cp_length: 128                 # Cyclic prefix length (samples)
sync_pos: 1                    # Sync symbol index in one frame
num_symbols: 100               # Number of OFDM symbols per frame
sensing_symbol_num: 100        # Number of symbols used in sensing processing
zc_root: 29                    # Zadoff-Chu root for sync/preamble
pilot_positions: [571, 631, 692, 752, 812, 872, 933, 993, 29, 89, 150, 210, 270, 330, 391, 451]  # Pilot subcarrier indices
# data_resource_blocks:          # Optional payload RE rectangles; omit for legacy full-grid payload mapping
#   - symbol_start: 2            # 0-based absolute frame symbol index
#     symbol_count: 4
#     subcarrier_start: 128      # 0-based FFT-bin index
#     subcarrier_count: 256
#   - symbol_start: 12
#     symbol_count: 2
#     subcarrier_start: 640
#     subcarrier_count: 128
#                              # Use [] to disable payload RE entirely; non-selected RE transmit pre-generated QPSK

# ===== Sensing FFT =====
range_fft_size: 1024           # Range FFT size
doppler_fft_size: 100          # Doppler FFT size
sensing_output_mode: dense     # dense or compact_mask
# sensing_mask_blocks:           # Used only when sensing_output_mode=compact_mask
#   - symbol_start: 0            # 0-based absolute frame symbol index
#     symbol_count: 2
#     subcarrier_start: 64       # 0-based FFT-bin index
#     subcarrier_count: 32

# ===== RF / Sampling =====
sample_rate: 50000000          # Baseband sample rate (Hz)
bandwidth: 50000000            # Analog bandwidth (Hz), usually same as sample_rate
center_freq: 3100000000        # RF center frequency (Hz)
tx_gain: 90                    # TX gain (dB)
tx_channel: 0                  # TX channel index on USRP

# ===== USRP Device Args =====
device_args: ""                # Shared fallback args
tx_device_args: "addr=192.168.40.2, master_clock_rate=200e6, num_recv_frames=512, num_send_frames=512"  # TX-specific args
rx_device_args: ""             # Default sensing RX args (empty = use device_args)

# ===== Clock / Time Sources =====
clock_source: "internal"       # Global clock source: internal/external/gpsdo
time_source: "internal"        # Global time source: empty -> follow clock_source
tx_clock_source: ""            # TX clock source override (optional)
tx_time_source: ""             # TX time source override (optional)
rx_clock_source: ""            # Sensing RX clock source override (optional)
rx_time_source: ""             # Sensing RX time source override (optional)

# ===== Wire Format =====
wire_format_tx: sc16           # TX wire format: sc16/sc8
wire_format_rx: sc16           # RX wire format: sc16/sc8

# ===== Network Output =====
udp_input_ip: "0.0.0.0"        # Bind IP for incoming payload UDP packets
udp_input_port: 50000          # Bind port for incoming payload UDP packets
mono_sensing_ip: "192.168.3.110"  # Monostatic sensing output IP (channel 0 default)
mono_sensing_port: 8888        # Monostatic sensing output port (channel 0 default)
control_port: 9999             # UDP port for runtime control commands
default_ip: "192.168.3.110"    # Default destination IP when per-output IP is empty
sensing_symbol_stride: 20      # Default STRD applied at startup before runtime commands

# ===== Sensing RX Channels =====
sensing_rx_channel_count: 2    # Number of sensing RX channels (0 disables sensing RX)
sensing_rx_channels:
  - usrp_channel: 0            # USRP RX channel index for this sensing path
    device_args: "addr=192.168.40.2, master_clock_rate=200e6, num_recv_frames=512, num_send_frames=512"  # Per-channel USRP args override
    clock_source: "external"   # Per-channel clock source override (optional)
    time_source: "internal"    # Per-channel time source override (optional)
    wire_format_rx: "sc16"     # Per-channel wire format override (optional)
    rx_gain: 30                # Per-channel RX gain (dB)
    alignment: 64              # Per-channel timing alignment offset (samples)
    rx_antenna: "RX2"          # RX antenna port (e.g. RX1/RX2/TX/RX)
    enable_system_delay_estimation: false  # If true, this channel runs delay estimation only and disables sensing pipeline
  - usrp_channel: 1            # USRP RX channel index for this sensing path
    device_args: "addr=192.168.40.2, master_clock_rate=200e6, num_recv_frames=512, num_send_frames=512"  # Per-channel USRP args override
    clock_source: "external"   # Per-channel clock source override (optional)
    time_source: "internal"    # Per-channel time source override (optional)
    wire_format_rx: "sc16"     # Per-channel wire format override (optional)
    rx_gain: 30                # Per-channel RX gain (dB)
    alignment: 64              # Per-channel timing alignment offset (samples)
    rx_antenna: "RX2"          # RX antenna port (e.g. RX1/RX2/TX/RX)
    enable_system_delay_estimation: false  # If true, this channel runs delay estimation only and disables sensing pipeline

# ===== Runtime / Debug =====
tx_circular_buffer_size: 32    # Modulator frame circular buffer capacity
data_packet_buffer_size: 32    # Encoded packet buffer capacity
paired_frame_queue_size: 32    # Per-channel RX/TX pairing queue capacity
profiling_modules: ""          # Comma-separated modules to profile (modulation, latency, data_ingest, sensing_proc, sensing_process), or "all"
cpu_cores:
  - 1   # TX thread
  - 2   # Modulation thread
  - 3   # Data-ingest thread
  - 4   # Sensing RX thread (CH0)
  - 5   # Sensing processing thread (CH0)
  - 6   # Sensing RX thread (CH1)
  - 7   # Sensing processing thread (CH1)
  - 8   # Main thread affinity
