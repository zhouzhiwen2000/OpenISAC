# OFDM Demodulator Configuration (Channel Simulator — no USRP)
#
# Must share simulation.session with ChannelSimulator and Modulator_Sim.yaml.

# ===== Radio backend =====
radio_backend: sim

# ===== Channel simulator (only `session` is used by the demodulator) =====
simulation:
  session: oisac_sim

# ===== OFDM Frame =====
fft_size: 1024
cp_length: 128
sync_pos: 1
enable_sec_sync_symbol: false
enable_cfo_training_sequence: false
cfo_training_period_samples: 16
num_symbols: 100
sensing_symbol_num: 100
frame_queue_size: 128
sync_queue_size: 32
sync_cfo_alias_search_range_hz: 800000.0
reset_hold_s: 0.5
zc_root: 29
pilot_positions: [571, 631, 692, 752, 812, 872, 933, 993, 29, 89, 150, 210, 270, 330, 391, 451]
midframe_pilot_symbols: [19, 39, 59, 79, 99]
midframe_pilot_seed: 1296453708
equalizer_mode: mmse
channel_tracking_mode: pilot_phase
equalizer_mag_floor: 1.0e-6
channel_tracking_min_pilot_snr: 1.0e-4

# ===== Sensing FFT =====
range_fft_size: 1024
doppler_fft_size: 100
sensing_output_mode: dense
enable_backend_sensing_processing: false

# ===== RF / Sampling =====
sample_rate: 50000000
bandwidth: 50000000
center_freq: 2400000000
rx_gain: 10                      # ignored in sim
rx_agc_enable: false             # no hardware gain in sim
rx_channel: 0

# ===== Device / clock (ignored in sim) =====
device_args: ""
clock_source: internal
wire_format_rx: sc16

# ===== Sync / Tracking =====
software_sync: true
predictive_delay: true
hardware_sync: false
desired_peak_pos: 20
sensing_symbol_stride: 20

# ===== Measurement mode (must match Modulator_Sim.yaml) =====
measurement_enable: false
measurement_mode: internal_prbs
measurement_payload_bytes: 1024

# ===== Network Output =====
enable_bi_sensing: true
bi_sensing_ip: "0.0.0.0"
bi_sensing_port: 8889
control_port: 10001
channel_ip: ""
channel_port: 12348
pdf_ip: ""
pdf_port: 12349
constellation_ip: ""
constellation_port: 12346
udp_output_ip: ""
udp_output_port: 50001

# ===== Runtime / Debug =====
default_out_ip: "127.0.0.1"
vofa_debug_ip: ""
vofa_debug_port: 12347
profiling_modules: ""
cpu_cores:
  - 1
  - 2
  - 3
  - 4
  - 5

# ===== Sensing RX Channels (demodulator side handled via bistatic path) =====
sensing_rx_channels: []
