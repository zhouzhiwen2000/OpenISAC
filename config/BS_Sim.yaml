# OFDM BS Configuration (Channel Simulator — no USRP)
#
# Run order:
#   1. ./ChannelSimulator            (reads this file, creates the shared "air")
#   2. ./BS               (this config copied to BS.yaml)
#   3. ./UE             (UE_Sim.yaml copied to UE.yaml)
# All three must share the same simulation.session.

# ===== Radio backend =====
radio_backend: sim               # "sim" = channel simulator, "uhd" = real USRP

# ===== Channel simulator =====
simulation:
  session: oisac_sim             # shared-memory namespace (must match UE + ChannelSimulator)
  enable_comm_rx: true           # produce the communication RX path (set false to run sensing-only, no UE)
  enable_sensing_rx: true        # produce the monostatic sensing RX paths (set false to run comm-only)
  noise_power_dbfs: -70          # AWGN power per RX channel (dBFS); lower = cleaner. <= -200 disables
  snr_control_enable: true       # Scale clean signal before AWGN to hit target_snr_db; ZMQ control can change it live
  target_snr_db: 40              # Initial target SNR in dB when snr_control_enable=true
  control_port: 10002            # ChannelSimulator ZMQ control port (separate from BS/UE)
  cfo_hz: 5000                   # Initial carrier offset before UE RX correction (Hz)
  timing_offset_samples: 0       # Constant sample delay injected on RX
  array_spacing_m: 0.04283       # Physical ULA element spacing (m); d/lambda scales with center_freq
                                 # (42.83 mm = lambda/2 @ 3.5 GHz, matches the sensing viewers).
                                 # Set <= 0 to use the legacy array_spacing_lambda instead.
  array_spacing_lambda: 0.5      # Legacy: fixed ULA spacing in wavelengths (only used if array_spacing_m <= 0)
  ring_capacity_samples: 262144  # ~2 frames; keeps TX close to the hub via backpressure
  steering_override_file: ""     # Optional [num_targets x num_channels] complex<float> matrix; empty = ULA
  comm_multipath_taps:           # Comm-link direct/LoS + static multipath (decodable component)
    - { delay_samples: 0,  gain_db: -30,   phase_deg: 0 }
  targets:                       # Monostatic sensing scatterers (range/velocity/gain/angle, with steering)
    - { range_m: 30, velocity_mps: 5,  gain_db: -36,  angle_deg: 20 }
    - { range_m: 75, velocity_mps: -3, gain_db: -42, angle_deg: -10 }
    - { range_m: 50, velocity_mps: 0, gain_db: -42, angle_deg: 60 }
  bistatic_targets:              # Independent scene for the bistatic (comm) channel.
    # Keep these well below the LoS (0 dB) so the comm link stays decodable.
    # angle_deg is ignored — comm RX is a single antenna.
    - { range_m: 30, velocity_mps: 5,  gain_db: -50, angle_deg: 0 }
    - { range_m: 75, velocity_mps: -3, gain_db: -56, angle_deg: 0 }

# ===== OFDM Frame =====
fft_size: 1024
cp_length: 128
sync_pos: 1
enable_sec_sync_symbol: false
enable_cfo_training_sequence: false
cfo_training_period_samples: 16
num_symbols: 100
sensing_symbol_num: 100
zc_root: 29
pilot_positions: [571, 631, 692, 752, 812, 872, 933, 993, 29, 89, 150, 210, 270, 330, 391, 451]
midframe_pilot_symbols: [19, 39, 59, 79, 99]
midframe_pilot_seed: 1296453708

# ===== Sensing FFT =====
range_fft_size: 1024
doppler_fft_size: 100
sensing_output_mode: dense
enable_backend_sensing_processing: false

# ===== RF / Sampling =====
sample_rate: 50000000
bandwidth: 50000000
center_freq: 2400000000
tx_gain: 60                      # ignored in sim, kept for completeness
tx_channel: 0

# ===== Device / clock (ignored in sim) =====
device_args: ""
clock_source: internal
time_source: "internal"
wire_format_tx: sc16
wire_format_rx: sc16

# ===== Duplex =====
uplink_idle_waveform: random_qpsk  # UE idle uplink waveform when no UDP payload is queued: random_qpsk/zero

# ===== Measurement mode (internal PRBS — no UDP video source needed) =====
measurement_enable: false
measurement_mode: internal_prbs
measurement_payload_bytes: 1024

# ===== Network Output =====
udp_input_ip: "0.0.0.0"
udp_input_port: 50000
mono_sensing_ip: "0.0.0.0"
mono_sensing_port: 8888
uplink_channel_ip: "0.0.0.0"
uplink_channel_port: 12358
uplink_pdf_ip: "0.0.0.0"
uplink_pdf_port: 12359
uplink_constellation_ip: "0.0.0.0"
uplink_constellation_port: 12356
control_port: 9999
sensing_symbol_stride: 20

# ===== Sensing RX Channels (simulated ULA elements) =====
sensing_rx_channel_count: 4
sensing_rx_channels:
  - { usrp_channel: 0, rx_gain: 0, alignment: 0, rx_antenna: "", rx_cpu_core: -1, processing_cpu_core: -1 }
  - { usrp_channel: 1, rx_gain: 0, alignment: 0, rx_antenna: "", rx_cpu_core: -1, processing_cpu_core: -1 }
  - { usrp_channel: 2, rx_gain: 0, alignment: 0, rx_antenna: "", rx_cpu_core: -1, processing_cpu_core: -1 }
  - { usrp_channel: 3, rx_gain: 0, alignment: 0, rx_antenna: "", rx_cpu_core: -1, processing_cpu_core: -1 }

# ===== Runtime / Debug =====
tx_circular_buffer_size: 32
data_packet_buffer_size: 32
paired_frame_queue_size: 64
profiling_modules: ""
downlink_cpu_cores:
  - 1   # TX thread
  - 2   # Modulation thread
  - 3   # Data-ingest thread
uplink_cpu_cores: []      # BS uplink CPU cores: RX sample ingest, OFDM/LLR processing, LDPC decode + UDP output
main_cpu_core: 6          # Main thread CPU core (-1 = no explicit binding)
